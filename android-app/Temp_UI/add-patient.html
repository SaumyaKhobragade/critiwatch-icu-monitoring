<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CritiWatch - Add Patient</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-section {
            padding: var(--spacing-md);
        }
        .form-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--border-color);
            margin-bottom: var(--spacing-lg);
        }
        .form-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-sm);
            border-bottom: 2px solid var(--soft-blue);
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        .scan-btn {
            background-color: var(--bg-secondary);
            color: var(--accent-primary);
            border: 1px dashed var(--accent-primary);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            cursor: pointer;
        }
        .scan-icon {
            font-size: 1.25rem;
        }
        .form-actions {
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="dashboard.html" class="nav-icon">←</a>
            <div class="header-title">Add New Patient</div>
            <div class="nav-icon">❓</div>
        </header>

        <div class="form-section">
            <div class="scan-btn">
                <span class="scan-icon">📷</span>
                <span>Scan Patient Wristband</span>
            </div>

            <div class="form-card">
                <h3 class="form-title">Patient Information</h3>
                <div class="form-group">
                    <label class="label">Full Name</label>
                    <input type="text" class="input" placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label class="label">Patient ID / MRN</label>
                    <input type="text" class="input" placeholder="e.g. P-123456">
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label class="label">Age</label>
                        <input type="number" class="input" placeholder="Years">
                    </div>
                    <div class="form-group">
                        <label class="label">Sex</label>
                        <select class="input">
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3 class="form-title">Admission Details</h3>
                <div class="form-group">
                    <label class="label">Ward / Unit</label>
                    <select class="input">
                        <option value="icu-a">ICU Unit A</option>
                        <option value="icu-b">ICU Unit B</option>
                        <option value="cardiac">Cardiac Care</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="label">Bed Number</label>
                    <input type="text" class="input" placeholder="e.g. ICU-04">
                </div>
                <div class="form-group">
                    <label class="label">Primary Diagnosis</label>
                    <textarea class="input" style="height: 80px; resize: none;" placeholder="Enter diagnosis..."></textarea>
                </div>
            </div>

            <div class="form-card">
                <h3 class="form-title">Initial Vitals (Optional)</h3>
                <div class="input-row">
                    <div class="form-group">
                        <label class="label">Heart Rate</label>
                        <input type="number" class="input" placeholder="BPM">
                    </div>
                    <div class="form-group">
                        <label class="label">SpO2</label>
                        <input type="number" class="input" placeholder="%">
                    </div>
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label class="label">Systolic BP</label>
                        <input type="number" class="input" placeholder="mmHg">
                    </div>
                    <div class="form-group">
                        <label class="label">Diastolic BP</label>
                        <input type="number" class="input" placeholder="mmHg">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary">Register Patient</button>
                <a href="dashboard.html" class="btn btn-outline">Cancel</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
