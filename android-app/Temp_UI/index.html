<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CritiWatch - Splash</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: var(--spacing-xl);
            background-color: var(--bg-primary);
        }
        .logo-block {
            margin-bottom: var(--spacing-xl);
        }
        .logo-icon {
            font-size: 4rem;
            color: var(--accent-primary);
            margin-bottom: var(--spacing-md);
        }
        .app-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }
        .app-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            max-width: 280px;
            margin-bottom: var(--spacing-xl);
        }
        .illustration-placeholder {
            width: 240px;
            height: 240px;
            background-color: var(--soft-blue);
            border-radius: 50%;
            margin-bottom: var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 0.875rem;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="container">
        <div class="splash-container">
            <div class="logo-block">
                <div class="logo-icon">🏥</div>
                <h1 class="app-name">CritiWatch</h1>
                <p class="app-subtitle">ICU Vital Monitoring and Deterioration Prediction Platform</p>
            </div>
            
            <div class="illustration-placeholder">
                [ ICU Monitoring Illustration ]
            </div>

            <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: var(--spacing-lg);">
                Smart mobile ICU monitoring with predictive alerts
            </p>

            <a href="login.html" class="btn btn-primary">Get Started</a>
        </div>
    </div>
    <script src="script.js"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
